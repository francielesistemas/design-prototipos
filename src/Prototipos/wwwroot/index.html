<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Protótipos de Design — Cooperativa Lar</title>
    <base href="/" />

    <!--
        Tipografia: o design system usa CentraleSansRnd como principal.
        Fallback web: Inter (Google Fonts) para manter proporcoes parecidas.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Tema Radzen Material COMPLETO (estilos visuais prontos).
         Nao usar material-base.css sozinho — ele e apenas o esqueleto sem estilos.
         Os tokens --rz-* de ds-tokens.css sobrescrevem as cores do Material pelo brand Lar. -->
    <link rel="stylesheet" href="_content/Radzen.Blazor/css/material.css" />

    <!-- Tokens do design system Lar (sobrescreve cores/tipografia do Radzen) -->
    <link rel="stylesheet" href="css/ds-tokens.css" />

    <!-- Estilos especificos da aplicacao -->
    <link rel="stylesheet" href="css/app.css" />

    <!-- CSS da pagina /design-system (global, sem escopo do Blazor) -->
    <link rel="stylesheet" href="css/design-system.css" />

    <!-- Bundle automatico do Blazor com o CSS escopado dos componentes (.razor.css) -->
    <link rel="stylesheet" href="Lar.Prototipos.styles.css" />

    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <!-- Tela de loading enquanto o WebAssembly carrega -->
        <div class="loading-wrapper">
            <div class="loading-spinner"></div>
            <p class="loading-text">Carregando protótipos…</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ocorreu um erro. Atualize a página pra tentar de novo.
        <a href="" class="reload">Recarregar</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/Radzen.Blazor/Radzen.Blazor.js"></script>
</body>

</html>
